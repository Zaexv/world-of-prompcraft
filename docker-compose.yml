services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_SERVER_URL=http://server:8000
    volumes:
      - ./client:/app
      - /app/node_modules
      - ./shared:/shared
    command: npm run dev -- --host

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - ./shared:/shared
    env_file:
      - .env
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
