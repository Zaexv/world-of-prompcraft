<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World of Promptcraft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* Apply custom cursor to body and explicitly to canvas so it's not overridden by defaults.
       We DO NOT use !important so JS can still set cursor='none' during camera drag. */
    html, body, canvas { 
      width: 100%; height: 100%; overflow: hidden; background: #000; 
      /* Custom Fantasy Golden Cursor */
      cursor: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23fff6cc'/%3E%3Cstop offset='50%25' stop-color='%23ffb700'/%3E%3Cstop offset='100%25' stop-color='%23805b00'/%3E%3C/linearGradient%3E%3Cfilter id='s'%3E%3CfeDropShadow dx='1' dy='2' stdDeviation='2' flood-color='%23000' flood-opacity='0.8'/%3E%3C/filter%3E%3C/defs%3E%3Cpath d='M3 2 L14 30 L17 19 L28 16 Z' fill='url(%23g)' stroke='%234a3200' stroke-width='1' filter='url(%23s)'/%3E%3Cpath d='M4 4 L13 26 L16 17 L25 14 Z' fill='none' stroke='%23ffee99' stroke-width='1'/%3E%3C/svg%3E") 3 2, auto;
    }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; }
    
    /* Ensure the cursor applies to all clickable UI elements too */
    a, button, [role="button"], input[type="button"], input[type="submit"], .clickable {
      cursor: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23ccf6ff'/%3E%3Cstop offset='50%25' stop-color='%2300b7ff'/%3E%3Cstop offset='100%25' stop-color='%23005b80'/%3E%3C/linearGradient%3E%3Cfilter id='s'%3E%3CfeDropShadow dx='1' dy='2' stdDeviation='2' flood-color='%23000' flood-opacity='0.8'/%3E%3C/filter%3E%3C/defs%3E%3Cpath d='M3 2 L14 30 L17 19 L28 16 Z' fill='url(%23g)' stroke='%2300324a' stroke-width='1' filter='url(%23s)'/%3E%3Cpath d='M4 4 L13 26 L16 17 L25 14 Z' fill='none' stroke='%2399eeff' stroke-width='1'/%3E%3C/svg%3E") 3 2, pointer !important;
    }
  </style>
  <script>
    // FIX: Automaticaly redirect 'localhost' to '127.0.0.1' to avoid the 500ms 
    // IPv6 resolution delay on Windows which causes stuttering during gameplay.
    if (window.location.hostname === 'localhost') {
      window.location.replace(window.location.href.replace('localhost', '127.0.0.1'));
    }
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
