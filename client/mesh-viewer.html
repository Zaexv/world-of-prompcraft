<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesh Visualizer</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0d1117; overflow: hidden; font-family: 'SF Mono', 'Consolas', monospace; color: #cdd9e5; }

      #viewer { position: fixed; inset: 0; }

      /* ── Grid overlay ─────────────────────────────────────────── */
      #gridOverlay {
        position: fixed; inset: 0; background: #0d1117;
        display: flex; flex-direction: column; overflow: hidden;
      }
      #gridHeader {
        flex: 0 0 auto; padding: 10px 16px;
        background: #161b22; border-bottom: 1px solid #30363d;
        display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      }
      #gridHeader h1 { font-size: 14px; font-weight: 600; color: #e6edf3; white-space: nowrap; }
      #tabBar { display: flex; gap: 4px; flex-wrap: wrap; }
      .tab {
        padding: 4px 10px; border-radius: 20px; border: 1px solid #30363d;
        background: transparent; color: #8b949e; cursor: pointer; font-size: 12px;
        font-family: inherit; transition: border-color 0.15s, color 0.15s;
      }
      .tab:hover { border-color: #58a6ff; color: #58a6ff; }
      .tab.active { background: #1f6feb; border-color: #1f6feb; color: #ffffff; }
      #searchInput {
        padding: 4px 10px; background: #0d1117; border: 1px solid #30363d;
        border-radius: 6px; color: #cdd9e5; font-size: 12px; font-family: inherit; width: 180px;
      }
      #searchInput:focus { outline: none; border-color: #58a6ff; }
      .header-spacer { flex: 1; }
      #backLink { color: #58a6ff; text-decoration: none; font-size: 12px; white-space: nowrap; }
      #backLink:hover { text-decoration: underline; }

      #meshGrid {
        flex: 1 1 0; min-height: 0; overflow-y: auto; overflow-x: hidden; padding: 16px;
        display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px; align-content: start; align-items: start; grid-auto-rows: max-content;
        scrollbar-width: thin; scrollbar-color: #30363d transparent;
      }
      #meshGrid::-webkit-scrollbar { width: 10px; }
      #meshGrid::-webkit-scrollbar-track { background: transparent; }
      #meshGrid::-webkit-scrollbar-thumb {
        background: #30363d; border-radius: 6px; border: 2px solid #0d1117;
      }
      #meshGrid::-webkit-scrollbar-thumb:hover { background: #484f58; }
      .tile {
        background: #161b22; border: 1px solid #30363d; border-radius: 10px;
        overflow: hidden; cursor: pointer;
        transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      }
      .tile:hover {
        border-color: #58a6ff; transform: translateY(-3px);
        box-shadow: 0 6px 16px rgba(31,111,235,0.3);
      }
      .tile img { width: 100%; height: 150px; display: block; background: #1a1a2e; object-fit: cover; }
      .tile-placeholder {
        width: 100%; height: 150px; background: #1c2128;
        display: flex; align-items: center; justify-content: center;
        color: #484f58; font-size: 11px;
      }
      .tile-info { padding: 7px 8px; }
      .tile-type { font-size: 11px; color: #e6edf3; word-break: break-all; line-height: 1.3; }
      .tile-bbox { font-size: 10px; color: #484f58; margin-top: 3px; min-height: 14px; }
      .tile.hidden { display: none; }

      /* ── Solo mode header ──────────────────────────────────────── */
      #soloHeader {
        display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 10;
        padding: 10px 16px; background: rgba(13,17,23,0.9);
        border-bottom: 1px solid #30363d; backdrop-filter: blur(8px);
        align-items: center; gap: 12px;
      }
      #backToGrid {
        padding: 4px 10px; border-radius: 20px; border: 1px solid #30363d;
        background: transparent; color: #8b949e; cursor: pointer; font-size: 12px; font-family: inherit;
      }
      #backToGrid:hover { border-color: #58a6ff; color: #58a6ff; }
      #soloTitle { font-size: 14px; color: #e6edf3; font-weight: 600; }
      #soloBbox { font-size: 12px; color: #58a6ff; }
      #fixBtn {
        padding: 4px 10px; border-radius: 20px; border: 1px solid #f85149;
        background: transparent; color: #f85149; cursor: pointer; font-size: 12px; font-family: inherit;
      }
      #fixBtn:hover { background: #f85149; color: #fff; }
      #fixBtn.active { background: #f85149; color: #fff; }

      /* ── Fixer mode overlay ────────────────────────────────────── */
      #fixOverlay {
        display: none; position: fixed; inset: 0; z-index: 20;
        cursor: crosshair; background: transparent;
      }
      #fixRect {
        position: fixed; display: none; z-index: 21; pointer-events: none;
        border: 2px solid #ff2d2d; background: rgba(255,45,45,0.08);
        box-shadow: 0 0 0 9999px rgba(0,0,0,0.0);
      }
      #fixHint {
        display: none; position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
        z-index: 22; padding: 6px 14px; border-radius: 6px; pointer-events: none;
        background: rgba(13,17,23,0.92); border: 1px solid #f85149;
        color: #f0f6fc; font-size: 12px; white-space: nowrap;
      }

      /* ── Save dialog ───────────────────────────────────────────── */
      #saveDialog {
        display: none; position: fixed; inset: 0; z-index: 30;
        background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
      }
      #saveBox {
        background: #161b22; border: 1px solid #30363d; border-radius: 10px;
        padding: 18px 20px; width: 420px; max-width: 90vw;
        display: flex; flex-direction: column; gap: 12px;
      }
      #saveBox h2 { font-size: 14px; color: #e6edf3; font-weight: 600; }
      #savePreview {
        width: 100%; max-height: 240px; object-fit: contain;
        background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      }
      #saveName {
        padding: 6px 10px; background: #0d1117; border: 1px solid #30363d;
        border-radius: 6px; color: #cdd9e5; font-size: 13px; font-family: inherit; width: 100%;
      }
      #saveName:focus { outline: none; border-color: #58a6ff; }
      .save-row { display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
      .save-btn {
        padding: 6px 14px; border-radius: 6px; border: 1px solid #30363d;
        background: transparent; color: #cdd9e5; cursor: pointer; font-size: 12px; font-family: inherit;
      }
      .save-btn:hover { border-color: #58a6ff; color: #58a6ff; }
      .save-btn.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
      .save-btn.primary:hover { background: #388bfd; color: #fff; }
      #saveStatus { font-size: 12px; color: #8b949e; margin-right: auto; }
      #saveStatus.ok { color: #3fb950; }
      #saveStatus.err { color: #f85149; }
    </style>
  </head>
  <body>
    <div id="viewer"></div>

    <div id="gridOverlay">
      <div id="gridHeader">
        <h1>Mesh Visualizer</h1>
        <div id="tabBar">
          <button class="tab active" data-tab="all">All</button>
          <button class="tab" data-tab="building">Buildings</button>
          <button class="tab" data-tab="prop">Props</button>
          <button class="tab" data-tab="vegetation">Vegetation</button>
          <button class="tab" data-tab="encounter">Encounters</button>
          <button class="tab" data-tab="npc">NPCs</button>
          <button class="tab" data-tab="player">Players</button>
        </div>
        <input id="searchInput" type="text" placeholder="Search types…" />
        <div class="header-spacer"></div>
        <a id="backLink" href="/">← Back to Game</a>
      </div>
      <div id="meshGrid"></div>
    </div>

    <div id="soloHeader">
      <button id="backToGrid">← Grid</button>
      <span id="soloTitle"></span>
      <span id="soloBbox"></span>
      <div class="header-spacer"></div>
      <button id="fixBtn">🔧 Fix Mesh</button>
    </div>

    <div id="fixHint">Drag a rectangle over the broken part — camera is locked. Esc to cancel.</div>
    <div id="fixOverlay"></div>
    <div id="fixRect"></div>

    <div id="saveDialog">
      <div id="saveBox">
        <h2>Save mesh-fix highlight</h2>
        <img id="savePreview" alt="capture preview" />
        <input id="saveName" type="text" spellcheck="false" />
        <div class="save-row">
          <span id="saveStatus"></span>
          <button class="save-btn" id="saveCancel">Cancel</button>
          <button class="save-btn primary" id="saveConfirm">Save to project</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/mesh-viewer.ts"></script>
  </body>
</html>
