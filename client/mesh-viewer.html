<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesh Visualizer</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0d1117; overflow: hidden; font-family: 'SF Mono', 'Consolas', monospace; color: #cdd9e5; }

      #viewer { position: fixed; inset: 0; }

      /* ── Grid overlay ─────────────────────────────────────────── */
      #gridOverlay {
        position: fixed; inset: 0; background: #0d1117;
        display: flex; flex-direction: column; overflow: hidden;
      }
      #gridHeader {
        flex: 0 0 auto; padding: 10px 16px;
        background: #161b22; border-bottom: 1px solid #30363d;
        display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      }
      #gridHeader h1 { font-size: 14px; font-weight: 600; color: #e6edf3; white-space: nowrap; }
      #tabBar { display: flex; gap: 4px; flex-wrap: wrap; }
      .tab {
        padding: 4px 10px; border-radius: 20px; border: 1px solid #30363d;
        background: transparent; color: #8b949e; cursor: pointer; font-size: 12px;
        font-family: inherit; transition: border-color 0.15s, color 0.15s;
      }
      .tab:hover { border-color: #58a6ff; color: #58a6ff; }
      .tab.active { background: #1f6feb; border-color: #1f6feb; color: #ffffff; }
      #searchInput {
        padding: 4px 10px; background: #0d1117; border: 1px solid #30363d;
        border-radius: 6px; color: #cdd9e5; font-size: 12px; font-family: inherit; width: 180px;
      }
      #searchInput:focus { outline: none; border-color: #58a6ff; }
      .header-spacer { flex: 1; }
      #backLink { color: #58a6ff; text-decoration: none; font-size: 12px; white-space: nowrap; }
      #backLink:hover { text-decoration: underline; }

      #meshGrid {
        flex: 1; overflow-y: auto; padding: 16px;
        display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 10px; align-content: start;
      }
      .tile {
        background: #161b22; border: 1px solid #30363d; border-radius: 8px;
        overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      }
      .tile:hover { border-color: #58a6ff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(31,111,235,0.25); }
      .tile img { width: 100%; aspect-ratio: 1; display: block; background: #1a1a2e; }
      .tile-placeholder {
        width: 100%; aspect-ratio: 1; background: #1c2128;
        display: flex; align-items: center; justify-content: center;
        color: #484f58; font-size: 11px;
      }
      .tile-info { padding: 7px 8px; }
      .tile-type { font-size: 11px; color: #e6edf3; word-break: break-all; line-height: 1.3; }
      .tile-bbox { font-size: 10px; color: #484f58; margin-top: 3px; min-height: 14px; }
      .tile.hidden { display: none; }

      /* ── Solo mode header ──────────────────────────────────────── */
      #soloHeader {
        display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 10;
        padding: 10px 16px; background: rgba(13,17,23,0.9);
        border-bottom: 1px solid #30363d; backdrop-filter: blur(8px);
        align-items: center; gap: 12px;
      }
      #backToGrid {
        padding: 4px 10px; border-radius: 20px; border: 1px solid #30363d;
        background: transparent; color: #8b949e; cursor: pointer; font-size: 12px; font-family: inherit;
      }
      #backToGrid:hover { border-color: #58a6ff; color: #58a6ff; }
      #soloTitle { font-size: 14px; color: #e6edf3; font-weight: 600; }
      #soloBbox { font-size: 12px; color: #58a6ff; }
    </style>
  </head>
  <body>
    <div id="viewer"></div>

    <div id="gridOverlay">
      <div id="gridHeader">
        <h1>Mesh Visualizer</h1>
        <div id="tabBar">
          <button class="tab active" data-tab="all">All</button>
          <button class="tab" data-tab="building">Buildings</button>
          <button class="tab" data-tab="prop">Props</button>
          <button class="tab" data-tab="vegetation">Vegetation</button>
          <button class="tab" data-tab="encounter">Encounters</button>
        </div>
        <input id="searchInput" type="text" placeholder="Search types…" />
        <div class="header-spacer"></div>
        <a id="backLink" href="/">← Back to Game</a>
      </div>
      <div id="meshGrid"></div>
    </div>

    <div id="soloHeader">
      <button id="backToGrid">← Grid</button>
      <span id="soloTitle"></span>
      <span id="soloBbox"></span>
    </div>

    <script type="module" src="/src/mesh-viewer.ts"></script>
  </body>
</html>
