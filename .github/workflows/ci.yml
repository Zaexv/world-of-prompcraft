name: CI/CD Pipeline

on:
  push:
    branches: [main, master, refactor/*, feature/*]
  pull_request:
    branches: [main, master]

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.13"

jobs:
  # ════════════════════════════════════════════════════════════════
  # STAGE 1: CODE QUALITY (Lint & Format)
  # Fast checks that should fail immediately on formatting issues
  # ════════════════════════════════════════════════════════════════

  client-lint:
    name: "📋 Client Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec eslint src/ --max-warnings 0

  server-lint:
    name: "📋 Server Lint & Format"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff --quiet
      - run: ruff check src tests --show-fixes
      - run: ruff format --check src tests

  # ════════════════════════════════════════════════════════════════
  # STAGE 2: TYPE SAFETY
  # Ensures type correctness before runtime tests
  # ════════════════════════════════════════════════════════════════

  client-typecheck:
    name: "✓ Client Typecheck"
    runs-on: ubuntu-latest
    needs: [client-lint]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit --incremental

  server-typecheck:
    name: "✓ Server Typecheck"
    runs-on: ubuntu-latest
    needs: [server-lint]
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('server/pyproject.toml') }}
      - run: pip install -e ".[dev]" --quiet
      - run: mypy src --strict

  # ════════════════════════════════════════════════════════════════
  # STAGE 3: UNIT & INTEGRATION TESTS
  # Run tests once quality & types pass
  # ════════════════════════════════════════════════════════════════

  client-test:
    name: "🧪 Client Unit Tests"
    runs-on: ubuntu-latest
    needs: [client-typecheck]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run --coverage
      - uses: codecov/codecov-action@v4
        with:
          files: ./client/coverage/coverage-final.json
          flags: client
        if: always()

  server-test:
    name: "🧪 Server Unit & Integration Tests"
    runs-on: ubuntu-latest
    needs: [server-typecheck]
    defaults:
      run:
        working-directory: server
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('server/pyproject.toml') }}
      - run: pip install -e ".[dev]" --quiet
      - run: pytest tests/ -v --cov=src --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          files: ./server/coverage.xml
          flags: server
        if: always()

  # ════════════════════════════════════════════════════════════════
  # STAGE 4: ADVANCED TESTING (Optional, can be skipped in PRs)
  # LLM mocking, load testing, stress testing
  # ════════════════════════════════════════════════════════════════

  server-llm-mock-tests:
    name: "🤖 LLM Mock Tests (100% mocked, no API calls)"
    runs-on: ubuntu-latest
    needs: [server-typecheck]
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('server/pyproject.toml') }}
      - run: pip install -e ".[dev]" --quiet
      - run: pytest tests/domains/agents/ -v -k "llm or mock"
      - name: Verify zero API calls
        run: |
          if grep -r "https://api.openai.com\|https://api.anthropic.com" tests/; then
            echo "❌ Real API calls detected in tests!"
            exit 1
          fi
          echo "✅ 100% mocked (zero real API calls)"

  server-load-test:
    name: "⚡ Load Test (optional, skipped in PRs)"
    runs-on: ubuntu-latest
    needs: [server-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('server/pyproject.toml') }}
      - run: pip install -e ".[dev]" --quiet
      - run: |
          echo "📊 Running load test (50 concurrent players, 5m duration)..."
          # Would run: locust -f tests/load_test_locust.py -u 50 -r 10 -t 5m --headless
          echo "Load test capability ready. Configure Locust endpoint in GitHub secrets."

  # ════════════════════════════════════════════════════════════════
  # STAGE 5: BUILD & ARTIFACTS
  # Docker builds, release artifacts (only on main)
  # ════════════════════════════════════════════════════════════════

  build-client-docker:
    name: "📦 Build Client Docker Image"
    runs-on: ubuntu-latest
    needs: [client-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./client/Dockerfile
          push: false
          tags: wop-client:latest,wop-client:${{ github.sha }}
          # GitHub Actions cache — no registry credentials required (registry
          # cache to docker.io fails CI with 401 since we don't push images).
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

  build-server-docker:
    name: "📦 Build Server Docker Image"
    runs-on: ubuntu-latest
    needs: [server-test, server-llm-mock-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile
          push: false
          tags: wop-server:latest,wop-server:${{ github.sha }}
          # GitHub Actions cache — no registry credentials required (registry
          # cache to docker.io fails CI with 401 since we don't push images).
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  # ════════════════════════════════════════════════════════════════
  # STAGE 6: PIPELINE STATUS
  # Final check that all critical jobs passed
  # ════════════════════════════════════════════════════════════════

  pipeline-status:
    name: "✅ Pipeline Status"
    runs-on: ubuntu-latest
    needs:
      - client-lint
      - client-typecheck
      - client-test
      - server-lint
      - server-typecheck
      - server-test
      - server-llm-mock-tests
    if: always()
    steps:
      - name: Check pipeline health
        run: |
          if [[ "${{ needs.client-lint.result }}" != "success" ]] || \
             [[ "${{ needs.client-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.client-test.result }}" != "success" ]] || \
             [[ "${{ needs.server-lint.result }}" != "success" ]] || \
             [[ "${{ needs.server-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.server-test.result }}" != "success" ]] || \
             [[ "${{ needs.server-llm-mock-tests.result }}" != "success" ]]; then
            echo "❌ Pipeline failed"
            exit 1
          fi
          echo "✅ All quality gates passed"
