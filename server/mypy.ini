[mypy]
python_version = 3.11
strict = True
plugins = mypy_django_plugin.main

[mypy.plugins.django-stubs]
django_settings_module = src.persistence.django_settings

# Django-generated migrations are machine-written; don't type-check them.
[mypy-src.persistence.gamedata.migrations.*]
ignore_errors = True

[mypy-langgraph.*]
ignore_missing_imports = True

[mypy-langgraph_checkpoint.*]
ignore_missing_imports = True

[mypy-langchain_core.*]
ignore_missing_imports = True

[mypy-langchain_openai.*]
ignore_missing_imports = True

[mypy-langchain_anthropic.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True
